<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Aidai's K-Drama Wall</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #fdf6f0;
    min-height: 100vh;
  }

  .header {
    background: #fff8f5;
    border-bottom: 1px solid #f0e0d6;
    padding: 20px 28px 16px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-left h1 { font-size: 1.5rem; color: #5a3e36; letter-spacing: 0.03em; font-weight: normal; }
  .header-left p { font-size: 0.75rem; color: #b89c94; margin-top: 2px; font-style: italic; font-family: sans-serif; }

  .header-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .mood-filter { display: flex; gap: 6px; flex-wrap: wrap; }

  .mood-btn {
    background: #fff; border: 1px solid #e8d5cc; border-radius: 20px;
    padding: 5px 12px; font-size: 0.7rem; color: #9e7060;
    cursor: pointer; font-family: sans-serif; transition: all 0.2s;
  }
  .mood-btn:hover, .mood-btn.active { background: #f7c5b0; border-color: #f7c5b0; color: #5a3e36; }

  .add-btn {
    background: #e8a898; border: none; border-radius: 20px;
    padding: 7px 16px; font-size: 0.75rem; color: #fff;
    cursor: pointer; font-family: sans-serif; transition: background 0.2s; white-space: nowrap;
  }
  .add-btn:hover { background: #d4897a; }

  .stats-bar {
    display: flex; gap: 20px; padding: 10px 28px;
    background: #fff8f5; border-bottom: 1px solid #f0e0d6;
  }
  .stat { font-family: sans-serif; font-size: 0.7rem; color: #b89c94; }
  .stat span { color: #c07060; font-weight: 600; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    padding: 24px 28px;
  }

  .card {
    background: #fff; border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(180,130,110,0.08);
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; position: relative;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(180,130,110,0.15); }

  .card-poster-placeholder {
    width: 100%; aspect-ratio: 2/3;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; font-size: 2.8rem;
  }

  .card-body { padding: 10px 10px 12px; }
  .card-title { font-size: 0.78rem; color: #5a3e36; font-weight: normal; line-height: 1.3; margin-bottom: 4px; }
  .card-year { font-family: sans-serif; font-size: 0.65rem; color: #c0a090; margin-bottom: 6px; }

  .card-mood {
    display: inline-block; font-size: 0.62rem; font-family: sans-serif;
    border-radius: 10px; padding: 2px 8px; margin-bottom: 6px;
  }

  .card-note { font-size: 0.65rem; font-family: sans-serif; color: #b89c94; font-style: italic; margin-top: 4px; line-height: 1.4; }

  .card-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(255,255,255,0.9); border-radius: 10px;
    padding: 2px 7px; font-size: 0.6rem; font-family: sans-serif;
    color: #c07060; font-weight: 600;
  }

  .mood-cozy { background: #fdebd0; color: #c47830; }
  .mood-cry  { background: #ddeeff; color: #4477aa; }
  .mood-hype { background: #ffe0f0; color: #c0407a; }
  .mood-laugh { background: #e8f8e0; color: #508040; }
  .mood-slow { background: #ede8f8; color: #7060b0; }

  .bg-rose     { background: linear-gradient(160deg, #fce4ec, #f8bbd0); }
  .bg-lavender { background: linear-gradient(160deg, #ede7f6, #d1c4e9); }
  .bg-mint     { background: linear-gradient(160deg, #e0f2f1, #b2dfdb); }
  .bg-peach    { background: linear-gradient(160deg, #fff3e0, #ffe0b2); }
  .bg-sky      { background: linear-gradient(160deg, #e3f2fd, #bbdefb); }
  .bg-blush    { background: linear-gradient(160deg, #fce4ec, #f48fb1); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(90,62,54,0.18);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(3px);
  }
  .modal {
    background: #fff8f5; border-radius: 24px; width: 100%; max-width: 420px;
    padding: 28px; box-shadow: 0 20px 60px rgba(90,62,54,0.18);
    position: relative; max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { font-size: 1.1rem; color: #5a3e36; font-weight: normal; margin-bottom: 20px; }

  .modal label {
    display: block; font-family: sans-serif; font-size: 0.7rem; color: #9e7060;
    margin-bottom: 4px; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .modal input, .modal textarea, .modal select {
    width: 100%; border: 1px solid #f0e0d6; border-radius: 10px;
    padding: 9px 12px; font-size: 0.82rem; font-family: sans-serif;
    color: #5a3e36; background: #fff; outline: none; transition: border-color 0.2s;
  }
  .modal input:focus, .modal textarea:focus { border-color: #e8a898; }
  .modal textarea { resize: vertical; min-height: 60px; }

  .star-picker { display: flex; gap: 6px; margin-top: 4px; }
  .star-pick { font-size: 1.3rem; cursor: pointer; opacity: 0.3; transition: opacity 0.15s, transform 0.15s; }
  .star-pick.lit { opacity: 1; color: #e8a898; }
  .star-pick:hover { transform: scale(1.2); }

  .mood-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .mood-pick {
    border: 1px solid #f0e0d6; border-radius: 16px; padding: 5px 12px;
    font-size: 0.72rem; font-family: sans-serif; cursor: pointer;
    transition: all 0.15s; color: #9e7060; background: #fff;
  }
  .mood-pick.selected { border-color: #e8a898; background: #fce8e0; color: #5a3e36; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

  .btn-save {
    flex: 1; background: #e8a898; border: none; border-radius: 12px;
    padding: 11px; color: #fff; font-size: 0.82rem; font-family: sans-serif; cursor: pointer;
  }
  .btn-save:hover { background: #d4897a; }
  .btn-cancel {
    background: #fff; border: 1px solid #f0e0d6; border-radius: 12px;
    padding: 11px 18px; color: #9e7060; font-size: 0.82rem; font-family: sans-serif; cursor: pointer;
  }
  .btn-delete {
    background: #fff; border: 1px solid #f9cfc8; border-radius: 12px;
    padding: 11px 14px; color: #d47070; font-size: 0.82rem; font-family: sans-serif; cursor: pointer;
  }
  .close-btn {
    position: absolute; top: 16px; right: 18px;
    background: none; border: none; font-size: 1.2rem; color: #c0a090; cursor: pointer;
  }

  .empty-state {
    grid-column: 1/-1; text-align: center;
    padding: 60px 20px; color: #c0a090; font-family: sans-serif; font-size: 0.85rem;
  }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🌸 Aidai's K-Drama Wall</h1>
    <p>a little corner of feels & favourites</p>
  </div>
  <div class="header-right">
    <div class="mood-filter" id="moodFilter">
      <button class="mood-btn active" data-mood="all">All</button>
      <button class="mood-btn" data-mood="cozy">🧸 Cozy</button>
      <button class="mood-btn" data-mood="cry">💔 Cry</button>
      <button class="mood-btn" data-mood="hype">🔥 Hype</button>
      <button class="mood-btn" data-mood="laugh">😂 Laugh</button>
      <button class="mood-btn" data-mood="slow">🌙 Slow Burn</button>
    </div>
    <button class="add-btn" id="openAddBtn">+ Add Drama</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>
<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal">
    <button class="close-btn" id="closeModal">✕</button>
    <h2 id="modalTitle">Add a Drama</h2>

    <label>Title *</label>
    <input id="fTitle" placeholder="e.g. Crash Landing on You" />

    <label>Year</label>
    <input id="fYear" placeholder="e.g. 2019" type="number" />

    <label>Poster Image</label>
    <div id="posterPreviewWrap" style="margin-bottom:6px;display:none;">
      <img id="posterPreview" style="width:80px;border-radius:8px;display:block;margin-bottom:6px;" />
      <button onclick="clearPoster()" style="font-size:0.7rem;font-family:sans-serif;background:none;border:1px solid #f0e0d6;border-radius:8px;padding:3px 10px;color:#d47070;cursor:pointer;">Remove</button>
    </div>
    <input type="file" id="fPoster" accept="image/*" style="font-family:sans-serif;font-size:0.78rem;color:#9e7060;" />
    <p style="font-size:0.65rem;font-family:sans-serif;color:#c0a090;margin-top:4px;">JPG, PNG, WebP — stored locally in your browser</p>

    <label>Mood</label>
    <div class="mood-picker" id="moodPicker">
      <button class="mood-pick" data-mood="cozy">🧸 Cozy</button>
      <button class="mood-pick" data-mood="cry">💔 Cry-worthy</button>
      <button class="mood-pick" data-mood="hype">🔥 Hype</button>
      <button class="mood-pick" data-mood="laugh">😂 Laugh-out-loud</button>
      <button class="mood-pick" data-mood="slow">🌙 Slow Burn</button>
    </div>

    <label>Your Rating</label>
    <div class="star-picker" id="starPicker">
      <span class="star-pick" data-val="1">★</span>
      <span class="star-pick" data-val="2">★</span>
      <span class="star-pick" data-val="3">★</span>
      <span class="star-pick" data-val="4">★</span>
      <span class="star-pick" data-val="5">★</span>
    </div>

    <label>Your Vibe Note</label>
    <textarea id="fNote" placeholder="e.g. Cried three times. Would watch again immediately."></textarea>

    <div class="modal-actions">
      <button class="btn-cancel" id="cancelModal">Cancel</button>
      <button class="btn-delete" id="deleteBtn" style="display:none">Delete</button>
      <button class="btn-save" id="saveBtn">Save ✨</button>
    </div>
  </div>
</div>

<script>
const MOOD_LABELS = { cozy:'🧸 Cozy', cry:'💔 Cry', hype:'🔥 Hype', laugh:'😂 Laugh', slow:'🌙 Slow Burn' };
const MOOD_CLASS  = { cozy:'mood-cozy', cry:'mood-cry', hype:'mood-hype', laugh:'mood-laugh', slow:'mood-slow' };
const BG_CLASSES  = ['bg-rose','bg-lavender','bg-mint','bg-peach','bg-sky','bg-blush'];

const SEED = [
  { id:1, title:'Crash Landing on You', year:2019, emoji:'🪂', poster:null, mood:'cry',   rating:5, note:'Cried three times. Hyun Bin lives in my head forever.' },
  { id:2, title:'Business Proposal',    year:2022, emoji:'💼', poster:null, mood:'laugh', rating:5, note:'Literally laughed the whole time. So fluffy.' },
  { id:3, title:'My Mister',            year:2018, emoji:'🌧️', poster:null, mood:'slow',  rating:5, note:'Quiet, deep, changed something in me.' },
  { id:4, title:'Goblin',               year:2016, emoji:'🕯️', poster:null, mood:'cry',   rating:5, note:'The coat scenes. Enough said.' },
  { id:5, title:'Hometown Cha-Cha-Cha', year:2021, emoji:'🌊', poster:null, mood:'cozy',  rating:4, note:'Cozy village vibes and the sweetest romance.' },
  { id:6, title:'Vincenzo',             year:2021, emoji:'🦅', poster:null, mood:'hype',  rating:5, note:'He is so unhinged and I love him for it.' },
];

let dramas = JSON.parse(localStorage.getItem('kdrama_wall') || 'null') || SEED.map(d=>({...d}));
let nextId = Math.max(...dramas.map(d=>d.id), 0) + 1;
let activeFilter = 'all';
let editingId = null, selectedRating = 0, selectedMood = '';

function save() { localStorage.setItem('kdrama_wall', JSON.stringify(dramas)); }
function bgFor(id) { return BG_CLASSES[id % BG_CLASSES.length]; }
function starStr(n, full=false) {
  if (full) return '★'.repeat(n) + '☆'.repeat(5-n);
  return '★'.repeat(n);
}

function renderStats() {
  const total = dramas.length;
  const avg = total ? (dramas.reduce((s,d)=>s+d.rating,0)/total).toFixed(1) : '-';
  const top = dramas.filter(d=>d.rating===5).length;
  document.getElementById('statsBar').innerHTML =
    `<div class="stat">Watched <span>${total}</span></div>
     <div class="stat">Avg rating <span>${avg} ★</span></div>
     <div class="stat">5-star favs <span>${top}</span></div>`;
}

function renderGrid() {
  const list = activeFilter === 'all' ? dramas : dramas.filter(d=>d.mood===activeFilter);
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div class="big">🌸</div>No dramas here yet — add one!</div>`;
    return;
  }
  grid.innerHTML = list.map(d => `
    <div class="card" onclick="openEdit(${d.id})">
      ${d.poster
        ? `<img class="card-poster-placeholder" src="${d.poster}" style="width:100%;aspect-ratio:2/3;object-fit:cover;display:block;" />`
        : `<div class="card-poster-placeholder ${bgFor(d.id)}">${d.emoji||'🎬'}</div>`}
      <div class="card-badge">${starStr(d.rating)} ${d.rating}/5</div>
      <div class="card-body">
        <div class="card-title">${d.title}</div>
        <div class="card-year">${d.year||''}</div>
        ${d.mood?`<span class="card-mood ${MOOD_CLASS[d.mood]}">${MOOD_LABELS[d.mood]}</span>`:''}
        ${d.note?`<div class="card-note">"${d.note}"</div>`:''}
      </div>
    </div>`).join('');
}

function render() { renderStats(); renderGrid(); }

document.getElementById('moodFilter').addEventListener('click', e => {
  const btn = e.target.closest('.mood-btn');
  if (!btn) return;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.mood;
  render();
});

let pendingPoster = null; // base64 string or null

function showPosterPreview(src) {
  document.getElementById('posterPreview').src = src;
  document.getElementById('posterPreviewWrap').style.display = 'block';
}

function clearPoster() {
  pendingPoster = null;
  document.getElementById('posterPreviewWrap').style.display = 'none';
  document.getElementById('fPoster').value = '';
}

function openModal(title, drama=null) {
  editingId = drama ? drama.id : null;
  selectedRating = drama ? drama.rating : 0;
  selectedMood = drama ? drama.mood : '';
  pendingPoster = drama?.poster || null;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('fTitle').value = drama?.title||'';
  document.getElementById('fYear').value = drama?.year||'';
  document.getElementById('fNote').value = drama?.note||'';
  document.getElementById('fPoster').value = '';
  if (pendingPoster) showPosterPreview(pendingPoster);
  else document.getElementById('posterPreviewWrap').style.display = 'none';
  updateStarUI(); updateMoodUI();
  document.getElementById('deleteBtn').style.display = drama ? 'block' : 'none';
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() { document.getElementById('modalOverlay').style.display='none'; editingId=null; }

function updateStarUI() {
  document.querySelectorAll('.star-pick').forEach(s=>
    s.classList.toggle('lit', parseInt(s.dataset.val) <= selectedRating));
}

function updateMoodUI() {
  document.querySelectorAll('.mood-pick').forEach(b=>
    b.classList.toggle('selected', b.dataset.mood === selectedMood));
}

document.getElementById('fPoster').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingPoster = ev.target.result;
    showPosterPreview(pendingPoster);
  };
  reader.readAsDataURL(file);
});

document.getElementById('openAddBtn').addEventListener('click', ()=>openModal('Add a Drama ✨'));
document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('cancelModal').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e=>{
  if (e.target===document.getElementById('modalOverlay')) closeModal();
});

document.getElementById('starPicker').addEventListener('click', e=>{
  const s = e.target.closest('.star-pick'); if (!s) return;
  selectedRating = parseInt(s.dataset.val); updateStarUI();
});

document.getElementById('moodPicker').addEventListener('click', e=>{
  const b = e.target.closest('.mood-pick'); if (!b) return;
  selectedMood = b.dataset.mood; updateMoodUI();
});

document.getElementById('saveBtn').addEventListener('click', ()=>{
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); return; }
  const drama = {
    id: editingId || nextId++,
    title,
    year: document.getElementById('fYear').value||'',
    emoji: '🎬',
    poster: pendingPoster || null,
    mood: selectedMood,
    rating: selectedRating||3,
    note: document.getElementById('fNote').value.trim(),
  };
  if (editingId) dramas = dramas.map(d=>d.id===editingId?drama:d);
  else dramas.push(drama);
  save(); closeModal(); render();
});

document.getElementById('deleteBtn').addEventListener('click', ()=>{
  if (!editingId) return;
  dramas = dramas.filter(d=>d.id!==editingId);
  save(); closeModal(); render();
});

function openEdit(id) {
  const d = dramas.find(d=>d.id===id);
  if (d) openModal('Edit Drama ✏️', d);
}

render();
</script>
</body>
</html>
